kind = "web"
previewPath = "/"
title = "Nightforce Directory"
version = "1.0.0"
id = "artifacts/nightforce-directory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25012

[services.development]
run = "pnpm --filter @workspace/nightforce-directory run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nightforce-directory", "run", "build" ]
publicDir = "artifacts/nightforce-directory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25012"
BASE_PATH = "/"
